<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系統設定 - 嵐雲地方檢察署案件查詢平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title text-serif" style="font-size: 1.1rem; line-height: 1.4;">嵐雲地方檢察署<br>案件查詢平台</div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">主控台概覽</a>
                <a href="cases.html" class="nav-item">案件列表管理</a>
                <a href="calendar.html" class="nav-item">庭期與行程管理</a>
                <a href="directory.html" class="nav-item">機關通訊錄</a>
                <a href="tracking.html" class="nav-item">案件狀態追蹤</a>
                <a href="upload.html" class="nav-item">判決書上傳</a>
                <a href="statistics.html" class="nav-item">統計報表</a>
                <a href="settings.html" class="nav-item active">系統設定</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <div class="user-info">
                    <span id="userNameDisplay">管理員</span> | 
                    <a href="#" id="logoutBtn" style="color: var(--danger); margin-left: 0.5rem;">登出</a>
                </div>
            </header>

            <div class="content-wrapper">
                <h2 class="page-title text-serif">系統設定與個人資料</h2>
                
                <div class="card" style="max-width: 600px; padding: 2rem;">
                    <form onsubmit="event.preventDefault(); alert('設定已儲存！');">
                        <h3 class="mb-3 text-serif">個人資料設定</h3>
                        <div class="form-group">
                            <label class="form-label">姓名</label>
                            <input type="text" class="form-control" value="管理員" required>
                        </div>
                        <div class="form-group mt-2">
                            <label class="form-label">電子郵件</label>
                            <input type="email" class="form-control" value="admin@lanyun.gov.tw" required>
                        </div>
                        <div class="form-group mt-2">
                            <label class="form-label">重設密碼</label>
                            <input type="password" class="form-control" placeholder="若不修改請留空">
                        </div>
                        
                        <h3 class="mb-3 mt-3 text-serif" style="border-top: 1px solid var(--border-color); padding-top: 1.5rem;">系統偏好設定</h3>
                        <div class="form-group" style="display: flex; align-items: center; gap: 1rem;">
                            <input type="checkbox" id="notifyEmail" checked>
                            <label for="notifyEmail" style="margin-bottom: 0;">啟用電子郵件通知 (當有新案件分配時)</label>
                        </div>
                        <div class="form-group mt-2" style="display: flex; align-items: center; gap: 1rem;">
                            <input type="checkbox" id="darkMode">
                            <label for="darkMode" style="margin-bottom: 0;">啟用深色模式 (保護視力)</label>
                        </div>
                        
                        <div class="mt-3">
                            <button type="submit" class="btn btn-primary">儲存設定</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
