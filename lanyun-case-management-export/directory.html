<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>機關通訊錄 - 嵐雲地方檢察署</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title text-serif" style="font-size: 1.1rem; line-height: 1.4;">嵐雲地方檢察署<br>案件查詢平台</div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">主控台概覽</a>
                <a href="cases.html" class="nav-item">案件列表管理</a>
                <a href="calendar.html" class="nav-item">庭期與行程管理</a>
                <a href="directory.html" class="nav-item active">機關通訊錄</a>
                <a href="tracking.html" class="nav-item">案件狀態追蹤</a>
                <a href="upload.html" class="nav-item">判決書上傳</a>
                <a href="statistics.html" class="nav-item">統計報表</a>
                <a href="settings.html" class="nav-item">系統設定</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <div class="user-info">
                    <span id="userNameDisplay">管理員</span> | 
                    <a href="#" id="logoutBtn" style="color: var(--danger); margin-left: 0.5rem;">登出</a>
                </div>
            </header>

            <div class="content-wrapper">
                <h2 class="page-title text-serif">機關通訊錄</h2>
                
                <div class="card">
                    <div class="card-header">
                        <input type="text" class="form-control" placeholder="搜尋姓名、股別或分機..." style="max-width: 300px;">
                    </div>
                    <div class="table-responsive">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>股別</th>
                                    <th>職稱</th>
                                    <th>姓名</th>
                                    <th>分機</th>
                                    <th>電子郵件</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- 請在此處新增您的通訊錄資料 -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
