<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理員登入 - 嵐雲地方檢察署案件查詢平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <h1 class="login-title text-serif" style="font-size: 1.8rem;">嵐雲地方檢察署<br>案件查詢平台</h1>
                <p class="login-subtitle">後台管理員登入</p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username" class="form-label">帳號 / 識別碼</label>
                    <input type="text" id="username" class="form-control" placeholder="請輸入您的帳號" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password" class="form-label">密碼</label>
                    <input type="password" id="password" class="form-control" placeholder="請輸入密碼" required>
                </div>
                <div id="errorMessage" class="login-error">帳號或密碼錯誤，請重試。</div>
                <div class="mt-3">
                    <button type="submit" class="btn btn-primary" style="width: 100%;">登入後台</button>
                </div>
                <div class="text-center mt-2">
                    <a href="index.html" style="font-size: 0.9rem; color: var(--text-light); text-decoration: underline;">返回公開查詢首頁</a>
                </div>
            </form>
            <div class="text-center mt-3">
                <p style="font-size: 0.8rem; color: var(--text-light);">僅供授權司法人員使用</p>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
